<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Hub - 人工智能学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
		
		.ai-loading-message {
			background: #e9ecef;
			color: #999;
			margin-right: auto;
			font-style: italic;
		}

		.ai-error-message {
			background: #ffe0e0;
			color: #c00;
			margin-right: auto;
		}

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .chat-container {
            grid-column: 1;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .ai-message {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
        }

        .chat-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .chat-input button:hover {
            background: #764ba2;
        }

        .resources-container {
            grid-column: 2;
            grid-row: 1 / 3;
        }

        .resource-section {
            margin-bottom: 20px;
        }

        .resource-section h3 {
            color: #764ba2;
            margin-bottom: 10px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }

        .resource-item {
            padding: 8px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .resource-item:hover {
            background: #e9ecef;
        }

        .resource-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .resource-item a:hover {
            text-decoration: underline;
        }

        .skills-container {
            grid-column: 1;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: default;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AI Learning Hub</h1>
            <p>探索人工智能的无限可能 - 我的AI学习之旅</p>
        </header>

        <div class="main-content">
            <!-- AI对话助手 -->
            <div class="card chat-container">
                <h2>🤖 AI学习助手</h2>
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        你好！我是AI学习助手，可以回答你关于人工智能、机器学习、深度学习等方面的问题。有什么想了解的吗？
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">发送</button>
                </div>
            </div>

            <!-- AI学习资源 -->
            <div class="card resources-container">
                <h2>📚 AI学习资源</h2>
                <div id="resourcesContent">
                    <p>加载中...</p>
                </div>
            </div>

            <!-- AI技能展示 -->
            <div class="card skills-container">
                <h2>💡 我的AI技能</h2>
                <div class="skill-tags">
                    <span class="skill-tag">机器学习</span>
                    <span class="skill-tag">深度学习</span>
                    <span class="skill-tag">自然语言处理</span>
                    <span class="skill-tag">计算机视觉</span>
                    <span class="skill-tag">PyTorch</span>
                    <span class="skill-tag">TensorFlow</span>
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">数据科学</span>
                    <span class="skill-tag">强化学习</span>
                    <span class="skill-tag">神经网络</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 加载AI学习资源
        async function loadResources() {
            try {
                const response = await fetch('/api/resources');
                const data = await response.json();
                
                const resourcesHTML = `
                    <div class="resource-section">
                        <h3>🎓 推荐课程</h3>
                        ${data.courses.map(course => `
                            <div class="resource-item">
                                <strong>${course.name}</strong> - ${course.platform}
                                ${course.link ? `<br><a href="${course.link}" target="_blank">开始学习 →</a>` : ''}
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="resource-section">
                        <h3>🛠 AI工具与框架</h3>
                        ${data.tools.map(tool => `
                            <div class="resource-item">
                                <strong>${tool.name}</strong>: ${tool.description}
                                <br><a href="${tool.link}" target="_blank">了解更多 →</a>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="resource-section">
                        <h3>📄 重要论文</h3>
                        ${data.papers.map(paper => `
                            <div class="resource-item">
                                <strong>${paper.name}</strong> (${paper.year})
                                <br>${paper.description}
                            </div>
                        `).join('')}
                    </div>
                `;
                
                document.getElementById('resourcesContent').innerHTML = resourcesHTML;
            } catch (error) {
                document.getElementById('resourcesContent').innerHTML = '<p>资源加载失败，请刷新页面重试</p>';
            }
        }

        // 发送消息到AI助手
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 显示加载状态
            const loadingDiv = addMessage('AI正在思考...', 'ai-loading');
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // 移除加载消息
                loadingDiv.remove();
                
                if (data.success) {
                    addMessage(data.reply, 'ai');
                } else {
                    addMessage('抱歉，AI服务暂时不可用，请稍后再试。', 'ai-error');
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('网络错误，请检查连接后重试。', 'ai-error');
            }
        }

        // 添加消息到聊天界面
        function addMessage(text, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageDiv;
        }

        // 页面加载时获取资源
        loadResources();
    </script>
</body>
</html>
